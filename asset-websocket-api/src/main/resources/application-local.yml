server:
  port: 8082
spring:
  config:
    activate:
      on-profile: local
  cloud:
    consul:
      host: ${CONSUL_HOST:localhost}
      port: ${CONSUL_PORT:8500}
      discovery:
        register: true
        prefer-ip-address: true
        health-check-path: /actuator/health
        health-check-interval: 10s
  data:
    redis:
      host: 127.0.0.1
      port: 6379

logging:
    level:
      com.stocat.asset.websocket.api: DEBUG